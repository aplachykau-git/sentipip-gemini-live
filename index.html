<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentiPiP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glow-blob"></div>

    <div class="container">
        <h1 class="logo">SentiPiP</h1>
        <div id="status">READY</div>
        
        <div id="subtitles-display"></div>
        <div id="emotion-tag"></div>
        
        <div class="controls">
            <button id="start-btn">Start Session</button>
            <button id="pip-btn" disabled>Open Picture-in-Picture</button>
        </div>

        <div class="settings">
            <label>Background Theme:</label>
            <select id="pip-theme">
                <option value="white">White</option>
                <option value="black">Black</option>
            </select>
        </div>
    </div>

    <video id="pip-video" autoplay muted playsinline></video>
    <canvas id="canvas-source" width="1300" height="200"></canvas>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
